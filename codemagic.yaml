workflows:
  android-capacitor-workflow:
    name: Android Capacitor Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    
    environment:
      vars:
        PACKAGE_NAME: "net.superfede.BleTimerWebView"
        APP_NAME: "BLE Timer"
      node: 22
      java: 21
      
    triggering:
      events:
        - push
        - tag
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
  
  android-peripheral-demo:
    name: Android BLE Peripheral Demo
    max_build_duration: 60
    instance_type: mac_mini_m1
    
    environment:
      vars:
        PACKAGE_NAME: "net.superfede.BlePeripheralDemo"
        APP_NAME: "BLE Peripheral Demo"
      node: 22
      java: 21
      
    triggering:
      events:
        - push
        - tag
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
        - pattern: 'reverse'
          include: true
          source: true
        - pattern: 'peripheral-demo'
          include: true
          source: true
      
    scripts:
      - name: Install npm dependencies
        script: |
          cd webclient
          npm ci
          
      - name: Install BLE Peripheral Plugin
        script: |
          cd webclient
          # Install plugin from local directory
          npm install ./ble-peripheral-plugin --no-save
          
          # Verify plugin is installed
          if [ -d "node_modules/@superfede/capacitor-ble-peripheral" ]; then
            echo "✓ Plugin installed successfully"
            ls -la node_modules/@superfede/capacitor-ble-peripheral/src/
          else
            echo "✗ Plugin installation failed"
            exit 1
          fi
          
      - name: Verify Plugin Structure
        script: |
          cd webclient
          echo "=== Checking plugin files ==="
          ls -la ble-peripheral-plugin/src/
          echo ""
          echo "=== Checking installed plugin ==="
          ls -la node_modules/@superfede/capacitor-ble-peripheral/src/
          echo ""
          echo "=== Checking package.json ==="
          cat node_modules/@superfede/capacitor-ble-peripheral/package.json
          
      - name: Build Peripheral Demo Web App
        script: |
          cd webclient
          CAPACITOR=true npm run build:peripheral
          
      - name: Verify Web Build
        script: |
          cd webclient
          echo "=== Checking dist-peripheral ==="
          ls -la dist-peripheral/
          echo ""
          echo "=== Checking index.html ==="
          cat dist-peripheral/index.html
          echo ""
          echo "=== Checking for main-peripheral reference ==="
          grep -i "main-peripheral" dist-peripheral/index.html || echo "WARNING: main-peripheral not found in index.html"
          
      - name: Initialize Capacitor for Peripheral Demo
        script: |
          cd webclient
          # Remove existing android folders to start fresh
          rm -rf android android-peripheral
          
          # Copy the peripheral config as the main config temporarily
          cp capacitor-peripheral.config.json capacitor.config.temp.json
          mv capacitor.config.json capacitor.config.json.backup
          mv capacitor.config.temp.json capacitor.config.json
          
          # Add Android platform (will use capacitor.config.json)
          npx cap add android
          
          # Copy Capacitor files to android folder
          npx cap copy android
          
          # Update Capacitor (generates all gradle files)
          npx cap update android
          
          # Manually create capacitor.settings.gradle if it doesn't exist
          if [ ! -f "android/capacitor.settings.gradle" ]; then
            echo "Creating capacitor.settings.gradle manually..."
            cat > android/capacitor.settings.gradle << 'EOF'
          // DO NOT EDIT THIS FILE! It is generated each time "capacitor update" is run.
          include ':capacitor-android'
          project(':capacitor-android').projectDir = new File('../node_modules/@capacitor/android')
          
          include ':capacitor-ble-peripheral'
          project(':capacitor-ble-peripheral').projectDir = new File('../node_modules/@superfede/capacitor-ble-peripheral/android')
          EOF
          fi
          
          # Manually create capacitor.build.gradle if it doesn't exist
          if [ ! -f "android/app/capacitor.build.gradle" ]; then
            echo "Creating capacitor.build.gradle manually..."
            cat > android/app/capacitor.build.gradle << 'EOF'
          // DO NOT EDIT THIS FILE! It is generated each time "capacitor update" is run.
          android {
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_21
              targetCompatibility JavaVersion.VERSION_21
            }
          }
          
          dependencies {
            implementation project(':capacitor-android')
            implementation project(':capacitor-ble-peripheral')
          }
          
          if (hasProperty('postBuildExtras')) {
            postBuildExtras()
          }
          EOF
          fi
          
          # Create capacitor-cordova-android-plugins folder to avoid errors
          mkdir -p android/capacitor-cordova-android-plugins
          cat > android/capacitor-cordova-android-plugins/cordova.variables.gradle << 'EOF'
          // Empty cordova variables file
          ext {
            cdvMinSdkVersion = 24
          }
          EOF
          
          # Verify Capacitor files were created
          echo "=== Checking Capacitor files ==="
          echo "✓ capacitor.settings.gradle:"
          cat android/capacitor.settings.gradle
          echo ""
          echo "✓ capacitor.build.gradle:"
          cat android/app/capacitor.build.gradle
          
          # Rename android folder to android-peripheral
          mv android android-peripheral
          
          # Restore original config files
          mv capacitor.config.json capacitor-peripheral.config.json
          mv capacitor.config.json.backup capacitor.config.json
          
          echo "✓ Android platform ready for peripheral demo"
          
      - name: Update Android Manifest for Peripheral
        script: |
          cd webclient/android-peripheral/app/src/main
          # Add BLE peripheral permissions to manifest
          perl -i -pe 's|(<manifest[^>]*>)|$1\n    <uses-permission android:name="android.permission.BLUETOOTH" />\n    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />\n    <uses-permission android:name="android.permission.BLUETOOTH_ADVERTISE" />\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\n    <uses-feature android:name="android.hardware.bluetooth_le" android:required="true" />|' AndroidManifest.xml
          
      - name: Set up local.properties for Peripheral
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > webclient/android-peripheral/local.properties
          
      - name: Build Peripheral Demo APK
        script: |
          cd webclient/android-peripheral
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Rename APK
        script: |
          cd webclient/android-peripheral/app/build/outputs/apk/debug
          mv app-debug.apk ble-peripheral-demo-debug.apk
          
    artifacts:
      - webclient/android-peripheral/app/build/outputs/**/*.apk
      
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
