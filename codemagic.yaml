workflows:
  android-capacitor-workflow:
    name: Android Capacitor Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    
    environment:
      vars:
        PACKAGE_NAME: "net.superfede.BleTimerWebView"
        APP_NAME: "BLE Timer"
      node: 22
      java: 21
      
    triggering:
      events:
        - push
        - tag
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
  
  android-peripheral-demo:
    name: Android BLE Peripheral Demo
    max_build_duration: 60
    instance_type: mac_mini_m1
    
    environment:
      vars:
        PACKAGE_NAME: "net.superfede.BlePeripheralDemo"
        APP_NAME: "BLE Peripheral Demo"
      node: 22
      java: 21
      
    triggering:
      events:
        - push
        - tag
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
        - pattern: 'reverse'
          include: true
          source: true
        - pattern: 'peripheral-demo'
          include: true
          source: true
      
    scripts:
      - name: Install npm dependencies
        script: |
          cd webclient
          npm ci
          
      - name: Install BLE Peripheral Plugin
        script: |
          cd webclient
          # Install plugin from local directory
          npm install ./ble-peripheral-plugin --no-save
          
          # Verify plugin is installed
          if [ -d "node_modules/@superfede/capacitor-ble-peripheral" ]; then
            echo "✓ Plugin installed successfully"
            ls -la node_modules/@superfede/capacitor-ble-peripheral/src/
          else
            echo "✗ Plugin installation failed"
            exit 1
          fi
          
      - name: Verify Plugin Structure
        script: |
          cd webclient
          echo "=== Checking plugin files ==="
          ls -la ble-peripheral-plugin/src/
          echo ""
          echo "=== Checking installed plugin ==="
          ls -la node_modules/@superfede/capacitor-ble-peripheral/src/
          echo ""
          echo "=== Checking package.json ==="
          cat node_modules/@superfede/capacitor-ble-peripheral/package.json
          
      - name: Build Peripheral Demo Web App
        script: |
          cd webclient
          CAPACITOR=true npm run build:peripheral
          
      - name: Setup Android Platform
        script: |
          cd webclient
          
          # Add Android platform if it doesn't exist
          if [ ! -d "android" ]; then
            echo "Adding Android platform..."
            npx cap add android
          else
            echo "Android platform already exists"
          fi
          
          # Sync to ensure everything is up to date
          npx cap sync android
          
          echo "✓ Android platform ready"
          ls -la android/
          
      - name: Build Peripheral Demo APK
        script: |
          cd webclient
          
          # Use the existing android folder (already properly configured)
          # Just need to swap the web assets
          
          # Backup current dist
          if [ -d "dist" ]; then
            mv dist dist-backup
          fi
          
          # Use peripheral dist
          mv dist-peripheral dist
          
          # Sync Capacitor to copy new web assets
          npx cap sync android
          
          # Restore original dist
          mv dist dist-peripheral
          if [ -d "dist-backup" ]; then
            mv dist-backup dist
          fi
          
          # Build APK
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          cd ..
          
          # Copy APK with new name
          mkdir -p ../build-output
          cp android/app/build/outputs/apk/debug/app-debug.apk ../build-output/ble-peripheral-demo-debug.apk
          
          cd ..
          echo "✓ Peripheral demo APK built successfully"
          
      - name: Rename APK
        script: |
          cd webclient
          mkdir -p ../build-output
          cp android/app/build/outputs/apk/debug/app-debug.apk ../build-output/ble-peripheral-demo-debug.apk
          echo "✓ APK renamed and ready"
          
    artifacts:
      - build-output/*.apk
      
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
